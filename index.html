<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>🛠️ Eskwela — Developer Console</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy-deepest: #030d1a;
    --navy-deep:    #061428;
    --navy-mid:     #0d2240;
    --navy-card:    #0f2a4d;
    --navy-border:  #1a3a60;
    --blue:         #0d47a1;
    --blue-bright:  #1565c0;
    --blue-light:   #4db6ac;
    --green:        #4caf50;
    --text-dim:     #7a9bb5;
    --white:        #ffffff;
    --w60:          rgba(255,255,255,0.6);
    --w15:          rgba(255,255,255,0.15);
    --w08:          rgba(255,255,255,0.08);
    --sidebar-w:    300px;
  }

  html, body { height: 100%; background: var(--navy-deepest); color: var(--white); font-family: 'DM Sans', sans-serif; font-size: 14px; line-height: 1.5; -webkit-font-smoothing: antialiased; overflow: hidden; }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--navy-border); border-radius: 4px; }

  /* Layout */
  #app { display: flex; height: 100vh; overflow: hidden; position: relative; }

  /* Sidebar */
  #sidebar {
    width: var(--sidebar-w);
    min-width: var(--sidebar-w);
    height: 100vh;
    background: var(--navy-deep);
    border-right: 1px solid var(--navy-border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    flex-shrink: 0;
    transition: transform 0.25s ease;
  }

  .logo-area {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 22px 18px 16px;
    border-bottom: 1px solid var(--navy-border);
  }
  .logo-icon { font-size: 28px; }
  .logo-title { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 16px; letter-spacing: 0.12em; }
  .logo-sub { font-size: 11px; color: var(--text-dim); letter-spacing: 0.04em; }
  #total-badge { margin-left: auto; background: var(--blue); color: var(--white); border-radius: 999px; font-size: 11px; font-weight: 700; padding: 2px 8px; display: none; }

  .search-wrap {
    display: flex; align-items: center; gap: 8px;
    margin: 12px 14px 8px;
    background: var(--navy-mid);
    border-radius: 10px;
    padding: 8px 12px;
    border: 1px solid var(--navy-border);
  }
  .search-wrap input {
    flex: 1; background: transparent; border: none; outline: none;
    color: var(--white); font-size: 13px; font-family: inherit;
  }
  .search-wrap input::placeholder { color: var(--text-dim); }

  .stats-row { display: flex; gap: 8px; padding: 0 14px 10px; }
  .stat-pill {
    background: var(--navy-mid); border-radius: 8px; padding: 4px 10px;
    font-size: 12px; border: 1px solid var(--navy-border);
  }
  .stat-pill span.val { font-weight: 600; }
  .stat-pill span.lbl { color: var(--text-dim); margin-left: 4px; }

  #thread-list { flex: 1; overflow-y: auto; padding: 4px 8px; }

  .empty-state { text-align: center; color: var(--text-dim); padding: 40px 20px; font-size: 13px; }

  .thread-item {
    display: flex; align-items: center; gap: 10px;
    width: 100%; background: transparent; border: none; border-radius: 10px;
    padding: 10px; cursor: pointer; text-align: left; color: var(--white);
    margin-bottom: 2px; transition: background 0.15s;
    border-left: 3px solid transparent;
  }
  .thread-item:hover { background: var(--w08); }
  .thread-item.active { background: var(--navy-card); border-left-color: var(--blue); padding-left: 7px; }

  .thread-avatar {
    width: 38px; height: 38px; border-radius: 50%;
    background: var(--navy-border); display: flex; align-items: center;
    justify-content: center; font-weight: 700; font-size: 13px;
    letter-spacing: 0.05em; flex-shrink: 0; color: var(--w60);
  }
  .thread-info { flex: 1; min-width: 0; }
  .thread-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2px; }
  .thread-name { font-weight: 600; font-size: 13px; }
  .thread-time { font-size: 11px; color: var(--text-dim); }
  .thread-preview { font-size: 12px; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 170px; }
  .unread-badge { background: var(--blue); color: var(--white); border-radius: 999px; font-size: 11px; font-weight: 700; padding: 2px 7px; flex-shrink: 0; }

  /* Main */
  #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: var(--navy-deepest); }

  /* Empty chat */
  #empty-chat { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; padding: 40px; }
  #empty-chat .big-icon { font-size: 52px; }
  #empty-chat h2 { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 20px; }
  #empty-chat p { font-size: 14px; color: var(--text-dim); text-align: center; max-width: 300px; line-height: 1.7; }

  /* Chat panel */
  #chat-panel { display: none; flex-direction: column; height: 100%; overflow: hidden; }
  #chat-panel.visible { display: flex; }

  /* Chat header */
  #chat-header {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 20px;
    border-bottom: 1px solid var(--navy-border);
    background: var(--navy-deep); flex-shrink: 0;
  }
  #back-btn {
    background: var(--w08); border: none; border-radius: 8px; color: var(--white);
    font-size: 18px; width: 34px; height: 34px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .chat-header-avatar {
    width: 40px; height: 40px; border-radius: 50%;
    background: var(--navy-border); display: flex; align-items: center;
    justify-content: center; font-weight: 700; font-size: 14px; color: var(--w60); flex-shrink: 0;
  }
  #chat-header-name { font-weight: 700; font-size: 15px; font-family: 'Syne', sans-serif; }
  #chat-header-id { font-size: 11px; color: var(--text-dim); font-family: monospace; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 200px; }
  .online-chip {
    display: flex; align-items: center; gap: 5px;
    background: rgba(76,175,80,0.15); border-radius: 999px;
    padding: 4px 10px; font-size: 12px; color: var(--green); font-weight: 600;
    margin-left: auto; flex-shrink: 0;
  }
  .online-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); }

  /* Messages */
  #message-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }

  .bubble-row { display: flex; align-items: flex-end; gap: 8px; }
  .bubble-row.dev { justify-content: flex-end; }
  .bubble-row.user { justify-content: flex-start; }

  .bubble-avatar {
    width: 30px; height: 30px; border-radius: 50%;
    background: var(--navy-border); display: flex; align-items: center;
    justify-content: center; font-size: 12px; font-weight: 700; color: var(--w60); flex-shrink: 0;
  }
  .bubble-avatar.dev-av { background: var(--blue); }

  .bubble-content { max-width: 70%; }
  .bubble-name { font-size: 11px; color: var(--text-dim); margin-bottom: 3px; padding-left: 4px; font-weight: 600; }

  .bubble {
    border-radius: 16px; padding: 10px 14px;
    font-size: 14px; line-height: 1.55; word-break: break-word;
  }
  .bubble.user-bubble { background: var(--navy-card); color: var(--white); border-top-left-radius: 4px; }
  .bubble.dev-bubble { background: var(--blue); color: var(--white); border-top-right-radius: 4px; }

  .bubble-time { font-size: 10px; color: var(--text-dim); margin-top: 3px; padding: 0 4px; }
  .bubble-time.right { text-align: right; }
  .bubble-time .dev-label { color: var(--blue-light); margin-right: 4px; }

  /* Input */
  #input-bar {
    display: flex; gap: 10px; padding: 12px 16px;
    border-top: 1px solid var(--navy-border);
    background: var(--navy-deep); align-items: flex-end; flex-shrink: 0;
  }
  #input-wrap {
    flex: 1; background: var(--navy-mid); border-radius: 14px;
    border: 1px solid var(--navy-border); padding: 10px 14px 6px;
  }
  #input-wrap textarea {
    width: 100%; background: transparent; border: none; outline: none;
    color: var(--white); font-size: 14px; font-family: inherit;
    resize: none; line-height: 1.5; max-height: 120px; overflow-y: auto;
  }
  #input-wrap textarea::placeholder { color: var(--text-dim); }
  .input-hint { font-size: 10px; color: var(--text-dim); margin-top: 3px; opacity: 0.6; }

  #send-btn {
    width: 44px; height: 44px; border-radius: 50%; background: var(--blue);
    border: none; color: var(--white); font-size: 20px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; transition: opacity 0.2s; flex-shrink: 0;
  }
  #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Mobile */
  #overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 9; }
  #mobile-open-btn {
    margin-top: 8px; background: var(--blue); border: none; border-radius: 10px;
    color: var(--white); padding: 10px 24px; cursor: pointer;
    font-family: inherit; font-size: 14px; font-weight: 600; display: none;
  }

  @media (max-width: 640px) {
    #sidebar { position: fixed; top: 0; left: 0; z-index: 10; transform: translateX(-100%); }
    #sidebar.open { transform: translateX(0); }
    #overlay.show { display: block; }
    #mobile-open-btn { display: block; }
    #back-btn { display: flex; }
    #chat-header-id { max-width: 120px; }
  }
  @media (min-width: 641px) {
    #back-btn { display: none; }
  }
</style>
</head>
<body>
<div id="app">

  <!-- Sidebar -->
  <aside id="sidebar">
    <div class="logo-area">
      <span class="logo-icon">🐧</span>
      <div>
        <div class="logo-title">ESKWELA</div>
        <div class="logo-sub">Developer Console</div>
      </div>
      <span id="total-badge">0</span>
    </div>

    <div class="search-wrap">
      <span style="font-size:13px;opacity:0.5">🔍</span>
      <input type="text" id="search-input" placeholder="Search users…" />
    </div>

    <div class="stats-row">
      <div class="stat-pill"><span class="val" id="stat-users" style="color:var(--green)">0</span><span class="lbl">users</span></div>
      <div class="stat-pill"><span class="val" id="stat-msgs" style="color:var(--blue-light)">0</span><span class="lbl">messages</span></div>
    </div>

    <div id="thread-list">
      <div class="empty-state">Loading…</div>
    </div>
  </aside>

  <!-- Overlay (mobile) -->
  <div id="overlay"></div>

  <!-- Main -->
  <main id="main">

    <!-- Empty state -->
    <div id="empty-chat">
      <div class="big-icon">🛠️</div>
      <h2>Select a conversation</h2>
      <p>Choose a user from the sidebar to start replying.</p>
      <button id="mobile-open-btn">View conversations</button>
    </div>

    <!-- Chat panel -->
    <div id="chat-panel">
      <header id="chat-header">
        <button id="back-btn">←</button>
        <div class="chat-header-avatar" id="chat-header-avatar"></div>
        <div style="flex:1;min-width:0">
          <div id="chat-header-name"></div>
          <div id="chat-header-id"></div>
        </div>
        <div class="online-chip"><div class="online-dot"></div> Active</div>
      </header>

      <div id="message-area"></div>

      <div id="input-bar">
        <div id="input-wrap">
          <textarea id="message-input" placeholder="Reply as developer…" rows="1"></textarea>
          <div class="input-hint">Enter to send · Shift+Enter for new line</div>
        </div>
        <button id="send-btn" disabled>↑</button>
      </div>
    </div>

  </main>
</div>

<script>
  // ── State ──────────────────────────────────────────────────────────────────
  let allMessages = []
  let selectedUser = null
  let refreshInterval = null

  // ── Helpers ────────────────────────────────────────────────────────────────
  function shortId(id) { return id.slice(0, 8).toUpperCase() }

  function formatTime(iso) {
    try {
      const d = new Date(iso), now = new Date()
      const diff = Math.floor((now - d) / 60000)
      if (diff < 1) return 'just now'
      if (diff < 60) return `${diff}m ago`
      if (diff < 1440) return `${Math.floor(diff/60)}h ago`
      if (diff < 10080) return `${Math.floor(diff/1440)}d ago`
      return d.toLocaleDateString()
    } catch { return '' }
  }

  function formatBubbleTime(iso) {
    try { return new Date(iso.slice(0,19)).toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' }) }
    catch { return '' }
  }

  // ── API calls ──────────────────────────────────────────────────────────────
  async function fetchAll() {
    try {
      const res = await fetch('/api/messages')
      allMessages = await res.json()
      renderThreads()
      if (selectedUser) renderChat()
    } catch(e) { console.error(e) }
  }

  async function sendReply(text) {
    await fetch('/api/send', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ user_id: selectedUser, message: text })
    })
    await fetchAll()
  }

  // ── Build threads ──────────────────────────────────────────────────────────
  function buildThreads() {
    const map = new Map()
    for (const msg of allMessages) {
      const ex = map.get(msg.user_id)
      if (!ex || msg.created_at > ex.lastTime) {
        map.set(msg.user_id, { user_id: msg.user_id, lastMessage: msg.message, lastTime: msg.created_at, unread: 0 })
      }
    }
    for (const [uid, thread] of map) {
      const userMsgs = allMessages.filter(m => m.user_id === uid && !m.is_developer)
      const devMsgs  = allMessages.filter(m => m.user_id === uid && m.is_developer)
      const lastDev  = devMsgs.length ? devMsgs[devMsgs.length-1].created_at : ''
      thread.unread  = userMsgs.filter(m => m.created_at > lastDev).length
    }
    return Array.from(map.values()).sort((a,b) => b.lastTime.localeCompare(a.lastTime))
  }

  // ── Render threads ─────────────────────────────────────────────────────────
  function renderThreads() {
    const threads = buildThreads()
    const search  = document.getElementById('search-input').value.toLowerCase()
    const filtered = threads.filter(t =>
      !search || t.user_id.toLowerCase().includes(search) || t.lastMessage.toLowerCase().includes(search)
    )

    // stats
    document.getElementById('stat-users').textContent = threads.length
    document.getElementById('stat-msgs').textContent  = allMessages.length

    // total unread badge
    const totalUnread = threads.reduce((s,t) => s + t.unread, 0)
    const badge = document.getElementById('total-badge')
    badge.textContent = totalUnread
    badge.style.display = totalUnread > 0 ? 'inline' : 'none'

    const list = document.getElementById('thread-list')
    if (filtered.length === 0) {
      list.innerHTML = `<div class="empty-state">${allMessages.length === 0 ? 'No conversations yet.' : 'No results.'}</div>`
      return
    }

    list.innerHTML = filtered.map(t => `
      <button class="thread-item ${selectedUser === t.user_id ? 'active' : ''}" data-uid="${t.user_id}">
        <div class="thread-avatar">${shortId(t.user_id).slice(0,2)}</div>
        <div class="thread-info">
          <div class="thread-top">
            <span class="thread-name">User ${shortId(t.user_id)}</span>
            <span class="thread-time">${formatTime(t.lastTime)}</span>
          </div>
          <div class="thread-preview">${escHtml(t.lastMessage)}</div>
        </div>
        ${t.unread > 0 ? `<span class="unread-badge">${t.unread}</span>` : ''}
      </button>
    `).join('')

    list.querySelectorAll('.thread-item').forEach(btn => {
      btn.addEventListener('click', () => selectUser(btn.dataset.uid))
    })
  }

  // ── Select user ────────────────────────────────────────────────────────────
  function selectUser(uid) {
    selectedUser = uid
    document.getElementById('empty-chat').style.display = 'none'
    document.getElementById('chat-panel').classList.add('visible')
    document.getElementById('chat-header-name').textContent = `User ${shortId(uid)}`
    document.getElementById('chat-header-id').textContent   = uid
    document.getElementById('chat-header-avatar').textContent = shortId(uid).slice(0,2)
    renderThreads()
    renderChat()
    closeSidebar()
  }

  // ── Render chat ────────────────────────────────────────────────────────────
  function renderChat() {
    const msgs = allMessages.filter(m => m.user_id === selectedUser)
    const area = document.getElementById('message-area')
    const wasAtBottom = area.scrollHeight - area.scrollTop - area.clientHeight < 60

    area.innerHTML = msgs.length === 0
      ? `<div class="empty-state">No messages yet.</div>`
      : msgs.map(msg => {
          const isDev = msg.is_developer
          return `
            <div class="bubble-row ${isDev ? 'dev' : 'user'}">
              ${!isDev ? `<div class="bubble-avatar">${shortId(msg.user_id).slice(0,2)}</div>` : ''}
              <div class="bubble-content">
                ${!isDev ? `<div class="bubble-name">User ${shortId(msg.user_id)}</div>` : ''}
                <div class="bubble ${isDev ? 'dev-bubble' : 'user-bubble'}">${escHtml(msg.message)}</div>
                <div class="bubble-time ${isDev ? 'right' : ''}">
                  ${isDev ? '<span class="dev-label">You ·</span>' : ''}
                  ${formatBubbleTime(msg.created_at)}
                </div>
              </div>
              ${isDev ? `<div class="bubble-avatar dev-av">🛠</div>` : ''}
            </div>
          `
        }).join('')

    if (wasAtBottom) area.scrollTop = area.scrollHeight
  }

  // ── XSS protection ─────────────────────────────────────────────────────────
  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
  }

  // ── Send ────────────────────────────────────────────────────────────────────
  const input   = document.getElementById('message-input')
  const sendBtn = document.getElementById('send-btn')

  input.addEventListener('input', () => {
    sendBtn.disabled = input.value.trim() === ''
    input.style.height = 'auto'
    input.style.height = Math.min(input.scrollHeight, 120) + 'px'
  })

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); doSend() }
  })
  sendBtn.addEventListener('click', doSend)

  async function doSend() {
    const text = input.value.trim()
    if (!text || !selectedUser) return
    input.value = ''
    input.style.height = 'auto'
    sendBtn.disabled = true
    await sendReply(text)
  }

  // ── Mobile sidebar ──────────────────────────────────────────────────────────
  function openSidebar() {
    document.getElementById('sidebar').classList.add('open')
    document.getElementById('overlay').classList.add('show')
  }
  function closeSidebar() {
    document.getElementById('sidebar').classList.remove('open')
    document.getElementById('overlay').classList.remove('show')
  }

  document.getElementById('back-btn').addEventListener('click', openSidebar)
  document.getElementById('mobile-open-btn').addEventListener('click', openSidebar)
  document.getElementById('overlay').addEventListener('click', closeSidebar)
  document.getElementById('search-input').addEventListener('input', renderThreads)

  // ── Boot ────────────────────────────────────────────────────────────────────
  fetchAll()
  setInterval(fetchAll, 4000)
</script>
</body>
</html>
